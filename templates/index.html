<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gate">
    <meta name="theme-color" content="#1c1c1e">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/gate.png">
    <title>Gate</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #1c1c1e;
            color: #fff;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            /* Safe areas for notch / Dynamic Island */
            padding: env(safe-area-inset-top, 20px)
                     env(safe-area-inset-right, 16px)
                     env(safe-area-inset-bottom, 20px)
                     env(safe-area-inset-left, 16px);
        }

        .label {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #636366;
            margin-bottom: 1.25rem;
        }

        .status {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
            transition: color 0.2s ease;
        }

        .status-desc {
            font-size: 0.9rem;
            font-weight: 500;
            color: #636366;
            margin-bottom: 0;
            transition: color 0.2s ease;
        }

        body.is-open  .status-desc { color: #c47800; }
        body.is-closed .status-desc { color: #1e8a3c; }

        .status-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            margin-bottom: 4px;
        }

        body.is-open  .status,
        body.is-open  .status-dot { color: #ff9f0a; background: #ff9f0a; }
        body.is-closed .status,
        body.is-closed .status-dot { color: #30d158; background: #30d158; }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            width: min(300px, 90vw);
            margin-top: 2.5rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 1.15rem 1rem;
            font-family: inherit;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            touch-action: manipulation;
            text-decoration: none;
            text-align: center;
            transition: opacity 0.15s ease, transform 0.1s ease;
            -webkit-appearance: none;
        }

        .btn:active {
            opacity: 0.65;
            transform: scale(0.97);
        }

        .btn-open  { background: #ff9f0a; color: #000; }
        .btn-close { background: #30d158; color: #000; }

        /* forms are layout-invisible so buttons remain direct flex children */
        .buttons form { display: contents; }
    </style>
</head>
<body class="{{ 'is-open' if status_text == 'OPEN' else 'is-closed' }}">

    <p class="label">Gate</p>

    <div class="status">
        <span class="status-dot"></span>{{ status_text }}
    </div>
    <p class="status-desc">
        {{ "Gate is currently open" if status_text == 'OPEN' else "Gate is currently closed" }}
    </p>

    <div class="buttons">
        <form method="POST" action="/">
            <input type="hidden" name="action" value="OPEN">
            <button type="submit" class="btn btn-open">Open</button>
        </form>
        <form method="POST" action="/">
            <input type="hidden" name="action" value="CLOSE">
            <button type="submit" class="btn btn-close">Close</button>
        </form>
    </div>

</body>
</html>
